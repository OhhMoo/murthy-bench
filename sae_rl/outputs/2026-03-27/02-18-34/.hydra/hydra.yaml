hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - data.train_files=/mnt/c/Users/OhhMoo/Desktop/git_repo/sae_rl/data/gsm8k_sft/train.parquet
    - data.val_files=/mnt/c/Users/OhhMoo/Desktop/git_repo/sae_rl/data/gsm8k_sft/test.parquet
    - data.messages_key=messages
    - data.micro_batch_size_per_gpu=4
    - data.max_length=1024
    - optim.lr=1e-4
    - engine=fsdp
    - model.path=Qwen/Qwen2.5-0.5B-Instruct
    - +model.override_config.attn_implementation=sdpa
    - trainer.default_local_dir=checkpoints/sft
    - trainer.project_name=sae_rl_gsm8k
    - trainer.experiment_name=sft_qwen2.5_0.5b
    - trainer.logger=["console","wandb"]
    - trainer.total_epochs=3
    - model.lora_rank=32
    - model.lora_alpha=16
    - model.target_modules=all-linear
  job:
    name: sft_trainer
    chdir: null
    override_dirname: +model.override_config.attn_implementation=sdpa,data.max_length=1024,data.messages_key=messages,data.micro_batch_size_per_gpu=4,data.train_files=/mnt/c/Users/OhhMoo/Desktop/git_repo/sae_rl/data/gsm8k_sft/train.parquet,data.val_files=/mnt/c/Users/OhhMoo/Desktop/git_repo/sae_rl/data/gsm8k_sft/test.parquet,engine=fsdp,model.lora_alpha=16,model.lora_rank=32,model.path=Qwen/Qwen2.5-0.5B-Instruct,model.target_modules=all-linear,optim.lr=1e-4,trainer.default_local_dir=checkpoints/sft,trainer.experiment_name=sft_qwen2.5_0.5b,trainer.logger=["console","wandb"],trainer.project_name=sae_rl_gsm8k,trainer.total_epochs=3
    id: ???
    num: ???
    config_name: sft_trainer_engine
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /mnt/c/Users/OhhMoo/Desktop/git_repo/sae_rl
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /mnt/c/Users/OhhMoo/Desktop/git_repo/verl/verl/trainer/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /mnt/c/Users/OhhMoo/Desktop/git_repo/sae_rl/outputs/2026-03-27/02-18-34
    choices:
      profiler: profiler
      optim: fsdp
      engine: fsdp
      model: hf_model
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
